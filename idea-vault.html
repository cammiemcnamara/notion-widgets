<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Idea Vault</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0e1e;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;pointer-events:none;}
.title{font-family:Georgia,'Times New Roman',serif;font-size:clamp(18px,3.5vw,28px);letter-spacing:0.8em;color:#c8b482;text-transform:uppercase;}
.sub{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:clamp(8px,1.2vw,11px);letter-spacing:0.25em;color:#6b6350;text-transform:uppercase;margin-top:8px;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay">
<div class="title">The Idea Vault</div>
<div class="sub">Where your ADHD sparks go to survive</div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth*2;H=canvas.height=window.innerHeight*2;}
resize();window.addEventListener('resize',resize);

const rand=(a,b)=>Math.random()*(b-a)+a;
const stars=[];for(let i=0;i<90;i++)stars.push({x:rand(0,1),y:rand(0,1),r:rand(0.5,2),phase:rand(0,Math.PI*2),speed:rand(0.003,0.015),base:rand(0.1,0.5)});

function makeHexes(){
const h=[];const hs=Math.max(20,H/8);
for(let row=0;row<Math.ceil(H/hs)+2;row++){
for(let col=0;col<5;col++){
let x=15+col*(hs*1.75)+(row%2)*(hs*0.875);
let y=-5+row*(hs*1.5);
if(x<W*0.09&&Math.random()<0.6)h.push({x,y,s:hs});
}
for(let col=0;col<5;col++){
let x=W/2-15-col*(hs*1.75)-(row%2)*(hs*0.875);
let y=-5+row*(hs*1.5);
if(x>W*0.91/2&&Math.random()<0.6)h.push({x,y,s:hs});
}}return h;}
let hexes=makeHexes();

function makeFrames(){
const sc=Math.min(W,H)/400;
return[
{x:14*sc,y:18*sc,w:82*sc,h:65*sc,corner:12*sc},
{x:8*sc,y:68*sc,w:58*sc,h:72*sc,corner:10*sc},
{x:W/2-90*sc,y:14*sc,w:78*sc,h:65*sc,corner:12*sc},
{x:W/2-68*sc,y:62*sc,w:58*sc,h:78*sc,corner:10*sc},
{x:28*sc,y:130*sc,w:56*sc,h:55*sc,corner:10*sc},
{x:W/2-82*sc,y:120*sc,w:58*sc,h:60*sc,corner:10*sc},
];}
let frames=makeFrames();

function makePaths(frms){
const p=[];
frms.forEach(f=>{
p.push({x1:f.x,y1:f.y,x2:f.x+f.w,y2:f.y,phase:rand(0,Math.PI*2),speed:rand(0.008,0.02)});
p.push({x1:f.x+f.w,y1:f.y,x2:f.x+f.w,y2:f.y+f.h,phase:rand(0,Math.PI*2),speed:rand(0.008,0.02)});
p.push({x1:f.x+f.w,y1:f.y+f.h,x2:f.x,y2:f.y+f.h,phase:rand(0,Math.PI*2),speed:rand(0.008,0.02)});
p.push({x1:f.x,y1:f.y+f.h,x2:f.x,y2:f.y,phase:rand(0,Math.PI*2),speed:rand(0.008,0.02)});
});return p;}
let paths=makePaths(frames);

function makeConnectors(){
const c=[];const p=[];
for(let i=0;i<6;i++){
let side=Math.random()<0.5;let x1,x2,y=rand(15,H/2-15);
if(side){x1=rand(55,110);x2=x1+rand(25,65);}
else{x2=W/2-rand(55,110);x1=x2-rand(25,65);}
c.push({x1,y1:y,x2,y2:y});
p.push({x1,y1:y,x2,y2:y,phase:rand(0,Math.PI*2),speed:rand(0.01,0.025)});
}return{connectors:c,connPaths:p};}
let{connectors,connPaths}=makeConnectors();
paths=paths.concat(connPaths);

window.addEventListener('resize',()=>{
resize();hexes=makeHexes();frames=makeFrames();
paths=makePaths(frames);
const cn=makeConnectors();connectors=cn.connectors;paths=paths.concat(cn.connPaths);
});

function drawHex(cx,cy,size,alpha){
ctx.beginPath();
for(let i=0;i<6;i++){let a=Math.PI/3*i-Math.PI/6;let px=cx+size*Math.cos(a);let py=cy+size*Math.sin(a);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}
ctx.closePath();ctx.strokeStyle=`rgba(45,50,68,${alpha})`;ctx.lineWidth=1;ctx.stroke();
}

function drawCornerFrame(f){
ctx.strokeStyle='rgba(55,60,78,0.6)';ctx.lineWidth=1;
ctx.beginPath();ctx.moveTo(f.x,f.y+f.corner);ctx.lineTo(f.x,f.y);ctx.lineTo(f.x+f.corner,f.y);ctx.stroke();
ctx.beginPath();ctx.moveTo(f.x+f.w-f.corner,f.y);ctx.lineTo(f.x+f.w,f.y);ctx.lineTo(f.x+f.w,f.y+f.corner);ctx.stroke();
ctx.beginPath();ctx.moveTo(f.x,f.y+f.h-f.corner);ctx.lineTo(f.x,f.y+f.h);ctx.lineTo(f.x+f.corner,f.y+f.h);ctx.stroke();
ctx.beginPath();ctx.moveTo(f.x+f.w-f.corner,f.y+f.h);ctx.lineTo(f.x+f.w,f.y+f.h);ctx.lineTo(f.x+f.w,f.y+f.h-f.corner);ctx.stroke();
}

let t=0;
function draw(){
t++;ctx.clearRect(0,0,W,H);
let grd=ctx.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#0a0e1e');grd.addColorStop(1,'#0e142a');ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
hexes.forEach((h,i)=>{let p=(Math.sin(t*0.008+i*0.7)+1)/2;drawHex(h.x,h.y,h.s,0.4+0.3*p);});
frames.forEach(f=>drawCornerFrame(f));
connectors.forEach(c=>{ctx.strokeStyle='rgba(40,44,58,0.6)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(c.x1,c.y1);ctx.lineTo(c.x2,c.y2);ctx.stroke();ctx.fillStyle='rgba(60,65,85,0.7)';ctx.beginPath();ctx.arc(c.x1,c.y1,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(c.x2,c.y2,2.5,0,Math.PI*2);ctx.fill();});
paths.forEach(p=>{let pos=(Math.sin(t*p.speed+p.phase)+1)/2;let px=p.x1+(p.x2-p.x1)*pos;let py=p.y1+(p.y2-p.y1)*pos;let g=ctx.createRadialGradient(px,py,0,px,py,12);g.addColorStop(0,'rgba(200,180,120,0.4)');g.addColorStop(1,'rgba(200,180,120,0)');ctx.fillStyle=g;ctx.fillRect(px-12,py-12,24,24);ctx.fillStyle='rgba(200,180,120,0.8)';ctx.beginPath();ctx.arc(px,py,1.5,0,Math.PI*2);ctx.fill();});
stars.forEach(s=>{let tw=(Math.sin(t*s.speed+s.phase)+1)/2;let a=s.base*(0.3+0.7*tw);let x=s.x*W;let y=s.y*H;if(a>0.3&&s.r>1){let sg=ctx.createRadialGradient(x,y,0,x,y,s.r*4);sg.addColorStop(0,`rgba(200,190,160,${a*0.3})`);sg.addColorStop(1,'rgba(200,190,160,0)');ctx.fillStyle=sg;ctx.fillRect(x-s.r*4,y-s.r*4,s.r*8,s.r*8);}ctx.fillStyle=`rgba(220,215,195,${a})`;ctx.beginPath();ctx.arc(x,y,s.r*0.8,0,Math.PI*2);ctx.fill();});
requestAnimationFrame(draw);}
draw();
</script>
</body>
</html>
