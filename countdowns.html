<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdowns</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Outfit:wght@200;300;400&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0a0b10;
    color: #f0ead6;
    font-family: 'Outfit', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  canvas#particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 60px;
    align-items: center;
    padding: 40px;
  }

  .card {
    text-align: center;
    padding: 30px 40px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border: 1px solid rgba(212,162,78,0.08);
    border-radius: 2px;
    pointer-events: none;
  }

  .card-label {
    font-family: 'Outfit', sans-serif;
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #7a7868;
    margin-bottom: 20px;
  }

  .number-big {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 72px;
    font-weight: 300;
    color: #d4a24e;
    line-height: 1;
    text-shadow: 0 0 40px rgba(212,162,78,0.15);
  }

  .number-unit {
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 200;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #7a7868;
    margin-top: 8px;
  }

  .sub-counts {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid rgba(212,162,78,0.06);
  }

  .sub-item {
    text-align: center;
  }

  .sub-number {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 28px;
    font-weight: 300;
    color: #d4a24e;
    opacity: 0.7;
  }

  .sub-label {
    font-family: 'Outfit', sans-serif;
    font-size: 8px;
    font-weight: 200;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #4a4838;
    margin-top: 2px;
  }

  .event-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 16px;
    font-weight: 300;
    font-style: italic;
    color: #f0ead6;
    opacity: 0.4;
    margin-top: 16px;
  }

  .divider-vertical {
    width: 1px;
    height: 180px;
    background: linear-gradient(180deg, transparent, rgba(212,162,78,0.2), transparent);
  }

  .amber-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #d4a24e;
    opacity: 0.4;
    margin: 0 auto;
    position: relative;
  }

  .amber-dot::after {
    content: '';
    position: absolute;
    top: -4px; left: -4px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(212,162,78,0.08);
  }

  @media (max-width: 700px) {
    .wrapper {
      flex-direction: column;
      gap: 30px;
      padding: 20px;
    }
    .divider-vertical {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,162,78,0.2), transparent);
    }
    .number-big { font-size: 56px; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="wrapper">
  <!-- Wedding Counter -->
  <div class="card">
    <div class="card-label">Since the Wedding</div>
    <div class="number-big" id="wedding-days">0</div>
    <div class="number-unit">Days</div>
    <div class="sub-counts">
      <div class="sub-item">
        <div class="sub-number" id="wedding-hours">0</div>
        <div class="sub-label">Hours</div>
      </div>
      <div class="sub-item">
        <div class="sub-number" id="wedding-mins">0</div>
        <div class="sub-label">Minutes</div>
      </div>
    </div>
    <div class="event-name">March 1st, 2026</div>
    <div style="margin-top:8px"><div class="amber-dot"></div></div>
  </div>

  <div class="divider-vertical"></div>

  <!-- Germany Countdown -->
  <div class="card">
    <div class="card-label">Until Germany</div>
    <div class="number-big" id="germany-days">0</div>
    <div class="number-unit">Days</div>
    <div class="sub-counts">
      <div class="sub-item">
        <div class="sub-number" id="germany-hours">0</div>
        <div class="sub-label">Hours</div>
      </div>
      <div class="sub-item">
        <div class="sub-number" id="germany-mins">0</div>
        <div class="sub-label">Minutes</div>
      </div>
    </div>
    <div class="event-name">Dublin → Frankfurt · June 1st</div>
    <div style="margin-top:8px"><div class="amber-dot"></div></div>
  </div>
</div>

<script>
const WEDDING = new Date('2026-03-01T00:00:00+00:00');
const GERMANY = new Date('2026-06-01T00:00:00+01:00');

function update() {
  const now = new Date();
  
  // Wedding - time since
  const wDiff = now - WEDDING;
  const wDays = Math.floor(wDiff / (1000*60*60*24));
  const wHours = Math.floor((wDiff % (1000*60*60*24)) / (1000*60*60));
  const wMins = Math.floor((wDiff % (1000*60*60)) / (1000*60));
  
  document.getElementById('wedding-days').textContent = wDays;
  document.getElementById('wedding-hours').textContent = wHours;
  document.getElementById('wedding-mins').textContent = String(wMins).padStart(2,'0');
  
  // Germany - time until
  const gDiff = GERMANY - now;
  if (gDiff > 0) {
    const gDays = Math.floor(gDiff / (1000*60*60*24));
    const gHours = Math.floor((gDiff % (1000*60*60*24)) / (1000*60*60));
    const gMins = Math.floor((gDiff % (1000*60*60)) / (1000*60));
    
    document.getElementById('germany-days').textContent = gDays;
    document.getElementById('germany-hours').textContent = gHours;
    document.getElementById('germany-mins').textContent = String(gMins).padStart(2,'0');
  } else {
    document.getElementById('germany-days').textContent = '🇩🇪';
    document.getElementById('germany-hours').textContent = '!';
    document.getElementById('germany-mins').textContent = '!';
  }
}

update();
setInterval(update, 60000);

// Particles
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initParticles();
}

function initParticles() {
  particles = [];
  const count = Math.floor((canvas.width * canvas.height) / 12000);
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      baseAlpha: Math.random() * 0.4 + 0.1,
      pulse: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.008 + 0.002,
      drift: (Math.random() - 0.5) * 0.05
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.pulse += p.speed;
    p.y += p.drift;
    if (p.y < -5) p.y = canvas.height + 5;
    if (p.y > canvas.height + 5) p.y = -5;
    
    const alpha = p.baseAlpha + Math.sin(p.pulse) * 0.12;
    const isAmber = Math.random() > 0.97;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = isAmber 
      ? `rgba(212, 162, 78, ${alpha * 0.6})`
      : `rgba(240, 234, 214, ${Math.max(0, alpha)})`;
    ctx.fill();
  });
  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
resize();
draw();
</script>
</body>
</html>
